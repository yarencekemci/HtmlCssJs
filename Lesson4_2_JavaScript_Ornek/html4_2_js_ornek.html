<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
</head>
<body>
    <div>
        <label>1.Sayı</label>
        <input type="text" id="sayi1" />
    </div>
    <div>
        <label>2.Sayi</label>
        <input type="text" id="sayi2" />
    </div>
    <div>
        <input type="button" onclick="SayiAralikToplam()" id="hesapla" value="HESAPLA" />
    </div>
    <p id="sonucGoster"> </p>

    <script>
        //html kodları içinde inputlar ile kullanıcıdan 2 sayı alınız. bu sayılar arasındaki sayıların toplamını hesaplayan function SayiAralikToplam() adında function ile hesaplayiniz.
        function SayiAralikToplam() {

            var sayi1 = parseInt(document.getElementById('sayi1').value);
            var sayi2 = parseInt(document.getElementById('sayi2').value);

            var toplam = 0;
            var buyukSayi;
            var kucukSayi;

            if (sayi1 > sayi2) {
                buyukSayi = sayi2;
                kucukSayi = sayi1;
            }
            else if (sayi2 > sayi1) {
                buyukSayi = sayi2;
                kucukSayi = sayi1;
            }
            while (buyukSayi >= kucukSayi) {
                toplam = toplam + kucukSayi;
                kucukSayi++;
            }
            document.getElementById("sonucGoster").innerHTML = "Toplam: " + toplam;

        }
    </script>
</body>
</html>
