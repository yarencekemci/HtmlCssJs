<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>

    <!--<link href="/bootstrap/bootstrap.css" rel="stylesheet" />-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
</head>
<body>
    <div class="container-fluid">
        <table class="table table-bordered table-hover ">
            <thead class="table-dark">
                <tr>
                    <th>Adı</th>
                    <th>Soyadı</th>
                    <th>Adres</th>
                    <th>Meslek</th>
                    <th>İş Ortakları</th>
                </tr>
            </thead>
            <tbody class="table-primary">
                <tr>
                    <td>Ahmet</td>
                    <td>Yılmaz</td>
                    <td>İstanbul</td>
                    <td>Mühendis</td>
                    <td>Mehmet Kaya</td>
                </tr>
                <tr>
                    <td>Ayşe</td>
                    <td>Demir</td>
                    <td>Ankara</td>
                    <td>Doktor</td>
                    <td>Fatma Çelik</td>
                </tr>
                <tr>
                    <td>Mehmet</td>
                    <td>Kara</td>
                    <td>İzmir</td>
                    <td>Avukat</td>
                    <td>Ali Veli</td>
                </tr>
                <tr>
                    <td>Elif</td>
                    <td>Şahin</td>
                    <td>Bursa</td>
                    <td>Öğretmen</td>
                    <td>Zeynep Arslan</td>
                </tr>
                <tr>
                    <td>Can</td>
                    <td>Koç</td>
                    <td>Antalya</td>
                    <td>Mimar</td>
                    <td>Emre Aydın</td>
                </tr>
            </tbody>
        </table>

    </div>
    <hr />
    <div class="container">
        <div class="row">
            <div class="col-md-6">
                <div class="col-md-12">
                    <label class="form-label">Adı</label>
                    <input type="text" class="input-group" />
                </div>
                <div class="col-md-12">
                    <label class="form-label">Soyadı</label>
                    <input type="text" class="input-group" />
                </div>
                <div class="col-md-12">
                    <label class="form-label">Sınıfı</label>
                    <input type="text" class="input-group" />
                </div>
            </div>
            <div class="col-md-12">
                <label class="form-label">Meslek</label>
                <input type="text" class="input-group" />
            </div>
            <div class="col-md-12">
                <label class="form-label">Adres</label>
                <input type="text" class="input-group" />
            </div>
            <div class="col-md-12">
                <label class="form-label">İş ortakları</label>
                <input type="text" class="input-group" />
            </div>
        </div>
    </div>
    <hr />

    <div class="mb-3">
        <label for="exampleFormControlInput1" class="form-label">Email address</label>
        <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="name@example.com">
    </div>
    <div class="mb-3">
        <label for="exampleFormControlTextarea1" class="form-label">Example textarea</label>
        <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
    </div>

    <hr />
    <div class="container">
        <div class="col-md-6">
            <label class="form-label">İl Seçiniz</label>
            <select class="form-select" aria-label="Default select example">
            <!--<select class="form-select" multiple aria-label="Multiple select example">-->
                <!--Multiple ile birden fazla seçim yapılabilir-->
                <option> İl Seçiniz!</option>
                <option value="34">İstanbul</option>
                <option value="06">Ankara</option>
                <option value="07">Antalya</option>
                <option value="53">Rize</option>
                <option selected value="30">Hakkari</option>
                <option value="22">Edirne</option>
            </select>
        </div>
    </div>

    <hr />
    <div class="container">
        <div class="row">
            <input type="button" value="tıkla" />
            <input type="button" class="btn mt-2" value="Tıkla" />
            <input type="button" class="btn btn-primary" value="Primary" />
            <input type="button" class="btn btn-danger" value="Danger" />
            <input type="button" class="btn btn-warning" value="Warning" />
            <input type="button" class="btn btn-success" value="Success" />
            <input type="button" class="btn btn-info" value="Info" />
            <input type="button" class="btn btn-light" value="Light" />
            <input type="button" class="btn btn-dark" value="Dark" />
            <input type="button" class="btn btn-link" value="Link" />
        </div>
    </div>
    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
