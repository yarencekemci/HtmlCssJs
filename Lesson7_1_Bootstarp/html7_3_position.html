<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
</head>
<body>
    <div class="container" pb-5>
        <h3>position</h3>
        <div class="position-relative">
            <div class="position-absolute top-0 start-0 bg-danger">start-0</div>
            <div class="position-absolute top-0 start-50 bg-primary">start-50</div>
            <div class="position-absolute top-0 start-100 bg-success">start-100</div>
        </div>
    </div>
    <hr />
    <div class="position-relative">
        <div class="position-absolute top-50 start-0 bg-danger">start-0</div>
        <div class="position-absolute top-50 end-50 bg-info">start-50</div>
        <div class="position-absolute bottom-50 end-100 bg-light">start-100</div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
