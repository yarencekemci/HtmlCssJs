<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
    <style type="text/css">
        div {color:red;
             background-color:yellow;
             /*YAREN*/
        }
        div h3 {
                text-align: center; /*yazının tag içindeki konumu left(sol) - center(ortala)- rigt(sağ)*/
                color: blue;
        }
        div section {
            background-color: lightgray; /*zemin rengi*/
        }
        div section h3 { /*div altında section, section altındaki h3 için css ayarları*/
                color: brown;
        }
        thead tr {
            color:aqua;
        }
        thead tr td {
                border: 2px double #b733ad; /*sınırları(çevresi) için sırasıyla=> çizgi kalınlığı(2px), çizgi tipi(solid), çizgi rengi*/
        }
        div p {
            color: springgreen;
        }
    </style>
</head>
<body>
    <div>
        Merhaba
    </div>
    <div>
        <h3>Dersler</h3>
    </div>

    <div>
        <section>
            <h3>Ders İçerikleri</h3>
            <table>
                <thead>
                    <tr>
                        <td>Ders Adı</td>
                        <td>Ders Süresi</td>
                    </tr>
                </thead>
                <tr>
                    <td>HTML</td>
                    <td>3 Saat</td>
                </tr>
                <tr>
                    <td>CSS</td>
                    <td>3 Saat</td>
                </tr>
            </table>

        </section>


    </div>
</body>
</html>
<!--yaren-->
